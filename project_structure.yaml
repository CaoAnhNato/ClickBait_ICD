project: "Capstone Project"
description: "Vietnamese Clickbait Detection using Pre-trained Language Models (PhoBERT, viBERT, viDeBERTa, ICD, etc.)"

directories:
  data:
    description: "Directory containing raw, processed datasets and data manipulation scripts."
    subdirectories:
      raw:
        description: "Original dataset files."
        files:
          - clickbait_dataset_vietnamese.csv: "Original Vietnamese clickbait dataset."
      processed:
        description: "Processed and split datasets ready for model training."
        subdirectories:
          cleaned:
            description: "Cleaned datasets with noise filtered out and optimized splits."
            files:
              - Cleaned_Clickbait_Dataset.csv: "The full cleaned dataset."
              - train_best_cleaned.csv: "Optimized training split (cleaned)."
              - validate_best_cleaned.csv: "Optimized validation split (cleaned)."
              - test_best_cleaned.csv: "Optimized testing split (cleaned)."
          icdv4:
            description: "Datasets enriched with reasoning generated by LLMs for ICDv4."
            files:
              - Cleaned_Clickbait_with_reasoning.parquet: "Cleaned dataset with merged LLM reasoning."
              - train_segmented.parquet: "Segmented training data for ICDv4."
              - validate_segmented.parquet: "Segmented validation data for ICDv4."
              - test_segmented.parquet: "Segmented testing data for ICDv4."
              - reasoning_all.jsonl: "Raw reasoning outputs from LLM."
              - generate_reasoning.log: "Log file for the reasoning generation process."
          icdv5:
            description: "Datasets enriched with reasoning + pattern tags for ICDv5 (Modular Expert)."
            files:
              - icdv5_train_full.parquet: "Full feature training data for ICDv5."
              - icdv5_train_segmented.parquet: "Segmented training data."
              - icdv5_train_base.parquet: "Base features only."
              - icdv5_train_patterns.parquet: "Extracted pattern tags for training."
              - icdv5_valid_full.parquet: "Full feature validation data."
              - icdv5_test_full.parquet: "Full feature testing data."
              - build_icdv5_dataset.py: "Script to assemble ICDv5 features."
              - prepare_icdv5_data.py: "Data preparation pipeline for ICDv5."
        files:
          - train.csv: "Standard training split."
          - validate.csv: "Standard validation split."
          - test.csv: "Standard testing split."
          - best_split_ids.json: "IDs for the best performing data split."
      EDA:
        description: "Exploratory Data Analysis notebooks and scripts."
        files:
          - check_case.ipynb: "Analysis of specific data cases."
          - check_distribute.ipynb: "Label distribution analysis."
          - extract_wrong_cases.py: "Identify and extract misclassified samples."
          - find_noise_label.py: "Detect potential label noise."
          - label_issues.json: "List of identified problematic labels."
          - test_tokenize.ipynb: "Testing VnCoreNLP tokenization."
          - wrong_case.json: "Detailed reports of wrong cases."
      test_data:
        description: "Specific split IDs for testing consistency."
        files:
          - split_ids.json: "JSON file containing row indices for splits."
    files:
      - split_data.py: "Script to split raw data into train/test/validate sets."
      - re_mapping_data.py: "Script to re-map or re-structure dataset fields."
      - build_icdv4_dataset.py: "Generates reasoning-based datasets for ICDv4."
      - check_data.ipynb: "Data validation and inspection."
      - clean_data.ipynb: "Filtering and cleaning noise from datasets."

  src:
    description: "Source code for model architectures and logic."
    subdirectories:
      ICD:
        description: "Core modules for the In-context Clickbait Detection (ICD) system."
        subdirectories:
          reasoning:
            description: "Logic for generating and validating LLM reasoning and pattern tags."
            files:
              - generate_reasoning.py: "LLM-based reasoning generation script."
              - generate_pattern_tags.py: "Extracting linguistic patterns from text."
              - prompts.py: "System and user prompts for LLM."
              - validate_reasoning.py: "Quality check for generated reasoning."
        files:
          - ICD_Model.py: "Base ICD model implementation."
          - ICD_Model_v3.py: "ICDv3 Architecture (FCL + Attention Pooling)."
          - ICD_Model_v4.py: "ICDv4 Architecture (Dual-Encoder + Contrastive Learning)."
          - ICD_Model_v5.py: "ICDv5 Architecture (Modular Pattern-Expert + Router)."
          - dataset_icdv5.py: "Custom Dataset class for ICDv5."
          - losses.py: "Standard and Contrastive loss functions."
          - losses_v5.py: "Specialized losses for ICDv5 (Router, KL)."
          - ICD_testing.py: "Testing utilities for ICD models."
      experience:
        description: "Experimental results, metrics, and checkpoints organized by version."
        subdirectories:
          ICDv3:
            description: "Logs and metrics for ICDv3 baseline."
          icdv4:
            description: "Logs, metrics, and checkpoints for ICDv4 reasoning model."
          icdv5:
            description: "Logs, metrics, and checkpoints for ICDv5 modular expert model."
          comparison:
            description: "Comparative reports between versions (v3 vs v4)."
          comparison_v5:
            description: "Comparative reports including v5."

  training:
    description: "Training scripts for various model architectures."
    subdirectories:
      ICD:
        description: "Scripts for training and evaluating ICD-based models."
        files:
          - train_ICD_v3.py: "Training script for ICDv3."
          - train_ICD_v4.py: "Training script for ICDv4."
          - train_ICD_v5.py: "Training script for ICDv5."
          - ablation_icdv5.py: "Ablation study script for ICDv5 experts."
          - debug_icdv5_experts.py: "Debug experts & router usage."
          - debug_icdv5_label_issues.py: "Debug hard cases from label_issues.json."
          - debug_icdv5_ablate_eval.py: "Fast ablation evaluation on checkpoint."
          - compare_v3_v4_v5.py: "Tri-version comparison script."
          - eval_only.py: "Evaluation script for pre-trained checkpoints."
      phoBERT:
        description: "Training code for PhoBERT (Base and Large)."
        files:
          - train_phobert.py
          - train_phobert-large.py
          - Tune_LoRA.py
          - Tune_DoRA.py
          - Tune_AdaLoRA.py
      viBERT:
        description: "Training code for viBERT models."
        files:
          - Tune_LoRA.py
          - Tune_LLRD.py
      videberta:
        description: "Training code for viDeBERTa models."
        files:
          - Tune_LoRA.py
          - Tune_LLRD.py
      XLMR:
        description: "Scripts for XLM-RoBERTa experiments."
        files:
          - Tune_LoRA.py
          - Tune_LLRD.py
      mBERT:
        description: "Training code for multilingual BERT (mBERT) models."
        files:
          - Tune_LoRA.py
          - Tune_LLRD.py
      vELECTRA:
        description: "Training code for vELECTRA models."
        files:
          - Tune_LoRA.py
          - Tune_LLRD.py
    files:
      - run_all.py: "Script to sequentially run all 5 models (mBERT, XLMR, viDeBERTa, viBERT, vELECTRA) under both LoRA and LLRD scenarios."

  implement:
    description: "Documentation, research notes, and implementation plans."
    files:
      - ICDv4.md: "Detailed ICDv4 architecture and research."
      - ICDv5_implementation_plan.md: "Plan for modular expert framework."
      - debug_model.md: "Notes and results from model debugging."
      - implementation_plan.md: "Overall project implementation roadmap."

  result:
    description: "Output directory for predictions, metrics, and checkpoints."
    subdirectories:
      ICD:
        description: "Detailed metrics and confusion matrices for ICD models."
      final:
        description: "Final combined result sets."
      results_phoBERT:
        description: "PhoBERT training checkpoints and logs."
      results_vibert:
        description: "viBERT training checkpoints and logs."
      results_videberta:
        description: "viDeBERTa training checkpoints and logs."
    files:
      - result_all.py: "Script to synthesize and generate result_all.csv from training configs."
      - result_all.csv: "Synthesized metrics across all models (Accuracy, Precision, Recall, F1-Macro, F1-Clickbait)."
      - PT_phobert_base.csv: "Pre-trained PhoBERT Base results."
      - PT_phobert_large.csv: "Pre-trained PhoBERT Large results."
      - CT_velectra_results.csv: "Comparative results for vElectra."

  test:
    description: "Unit tests, shape validation, and quick training tests."
    files:
      - test_nlp.py: "Tokenizer and NLP pipeline testing."
      - test_icdv5_shapes.py: "Tensor shape validation for ICDv5."
      - train_phobert_quick.py: "Small-scale PhoBERT training test."

  vncorenlp_data:
    description: "Dependency: VnCoreNLP models and JAR files for Vietnamese text processing."

root_files:
  - README.md: "Project overview and setup instructions."
  - requirements.txt: "Python dependencies."
  - project_structure.yaml: "This file, defining the project organization."
  - mlruns/: "MLflow experiment tracking data."
  - wandb/: "Weights & Biases local logs."
  - improve.docx: "Documentation for improvements or notes."
  - run.txt: "Execution logs or environment notes."
  - skills-lock.json: "Lock file for agent skills/metadata."
